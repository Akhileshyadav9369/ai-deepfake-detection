<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detection Result</title>

    <style>

        body{
            background:#020817;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:500px;
            background:#0f172a;
            padding:30px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 0 30px rgba(0,0,0,0.5);
        }

        img{
            width:100%;
            border-radius:15px;
            margin-bottom:20px;
        }

        h1{
            margin-bottom:20px;
        }

        .real{
            color:#00ff99;
        }

        .fake{
            color:#ff4d88;
        }

        a{
            display:inline-block;
            margin-top:20px;
            padding:12px 25px;
            background:linear-gradient(to right,#2563eb,#9333ea);
            color:white;
            text-decoration:none;
            border-radius:10px;
        }

    </style>
</head>
<body>

    <div class="container">

        <h1>Detection Result</h1>

        <img src="{{ image_path }}" alt="Uploaded Image">

        {% if prediction == "REAL" %}
            <h2 class="real">REAL IMAGE</h2>
        {% else %}
            <h2 class="fake">FAKE IMAGE</h2>
        {% endif %}

        <h3>Confidence: {{ confidence }}%</h3>

        <a href="/">Try Another Image</a>

    </div>

</body>
</html>
